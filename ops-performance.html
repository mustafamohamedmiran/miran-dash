<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miran OPS Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--sidebar:#111827;--surface:#1C2333;--surface2:#232D3F;--surface3:#2A3550;
  --border:#2E3A50;--border2:#3A4A65;
  --text:#E8EDF5;--text2:#8B9BB4;--text3:#4A5A75;
  --cyan:#00D4AA;--cyan2:#00B894;--cdim:rgba(0,212,170,0.12);
  --gold:#F0A500;--gdim:rgba(240,165,0,0.12);
  --blue:#4F8EF7;--bdim:rgba(79,142,247,0.12);
  --purple:#A855F7;--pdim:rgba(168,85,247,0.12);
  --red:#FF6B6B;--rdim:rgba(255,107,107,0.12);
  --green:#4ADE80;--orange:#FB923C;--odim:rgba(251,146,60,0.12);
  --r:10px;--rl:14px;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;direction:rtl}
body.ltr{font-family:'Inter',sans-serif;direction:ltr}
body.ltr .sidebar{border-right:1px solid var(--border);border-left:none}
body.ltr .shell{flex-direction:row}
body.ltr .nav-item{flex-direction:row;text-align:left}
body.ltr .kpi-actions{left:auto;right:8px}
body.ltr .topbar{flex-direction:row}
body.ltr .topbar-right{flex-direction:row}
body.ltr .topbar-left{flex-direction:row}
body.ltr .tbl-wrap table th,body.ltr .tbl-wrap table td{text-align:left}
body.ltr .mth-btn{flex-direction:row}
body.ltr .mth-item{flex-direction:row}
body.ltr .page-hdr{flex-direction:row}
body.ltr .page-hdr-left{flex-direction:row}
body.ltr .page-hdr-right{flex-direction:row}
body.ltr .sidebar-footer{text-align:left}
body.ltr .nav-count{margin-left:auto;margin-right:0}
body.ltr .modal{direction:ltr;text-align:left}
body.ltr .modal-actions{flex-direction:row}
body.ltr input,body.ltr select,body.ltr textarea{text-align:left}
body.ltr .chart-legend{justify-content:flex-start}
body.ltr .sec-hdr{flex-direction:row}
body.ltr .sec-actions{flex-direction:row}
body.ltr .kpi-card-top{flex-direction:row}
body.ltr .kpi-label,body.ltr .kpi-value,body.ltr .kpi-vs{text-align:left}
body.ltr .toast{right:20px;left:auto}
.shell{display:flex;min-height:calc(100vh - 52px);flex-direction:row-reverse}
/* TOPBAR */
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);height:52px;display:flex;flex-direction:row-reverse;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:14px;flex-direction:row-reverse}
.logo-wrap{display:flex;align-items:center;justify-content:center;height:40px;flex-shrink:0}
.logo-wrap img{height:36px;width:auto;object-fit:contain}
.brand-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.brand-sub{font-size:10px;color:var(--text2)}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--cdim);border:1px solid rgba(0,212,170,0.25);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--cyan);font-weight:500;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-right{display:flex;align-items:center;gap:8px;flex-direction:row-reverse}
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.lang-btn{padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s;font-family:inherit}
.lang-btn.active{background:var(--cyan);color:#0D1117}
.lang-btn:hover:not(.active){color:var(--text)}
.lang-sep{width:1px;height:18px;background:var(--border2)}
/* BUTTONS */
.btn{border:none;border-radius:7px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-cyan{background:var(--cyan);color:#0D1117}
.btn-cyan:hover{background:var(--cyan2)}
.btn-danger{background:rgba(255,107,107,0.15);color:var(--red);border:1px solid rgba(255,107,107,0.25)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-gold{background:var(--gold);color:#0D1117}
.btn-gold:hover{background:#D4920A}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{background:#9333EA}
.btn-xs{padding:3px 7px;font-size:10px;border-radius:5px}
.btn-sm{padding:5px 10px;font-size:11px}
/* SIDEBAR */
.sidebar{width:228px;flex-shrink:0;background:var(--sidebar);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;position:sticky;top:52px;height:calc(100vh - 52px)}
.nav-section{padding:14px 10px 6px}
.nav-label{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text3);padding:0 8px 8px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px;flex-direction:row-reverse}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--cdim);color:var(--cyan);border:1px solid rgba(0,212,170,0.18)}
.nav-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--surface2)}
.nav-item.active .nav-icon{background:rgba(0,212,170,0.15)}
.nav-item.admin-nav.active{background:rgba(168,85,247,0.12);color:var(--purple);border-color:rgba(168,85,247,0.2)}
.nav-item.admin-nav.active .nav-icon{background:rgba(168,85,247,0.15)}
.nav-count{margin-right:auto;font-size:10px;background:var(--surface2);padding:1px 6px;border-radius:8px;color:var(--text3)}
.nav-item.active .nav-count{background:rgba(0,212,170,0.2);color:var(--cyan)}
.sidebar-div{height:1px;background:var(--border);margin:8px 12px}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);text-align:right}
/* MONTH DROPDOWN */
.mth-section{padding:10px}
.mth-btn{width:100%;display:flex;align-items:center;justify-content:space-between;flex-direction:row-reverse;padding:9px 12px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;cursor:pointer;color:var(--text);font-size:13px;font-weight:500;font-family:inherit;transition:all .15s}
.mth-btn:hover{border-color:var(--cyan)}
.mth-btn.open{border-color:var(--cyan);border-bottom-left-radius:0;border-bottom-right-radius:0}
.chevron{font-size:10px;color:var(--text3);transition:transform .2s}
.mth-btn.open .chevron{transform:rotate(180deg)}
.mth-panel{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--surface);border:1px solid var(--cyan);border-top:none;border-radius:0 0 9px 9px}
.mth-panel.open{max-height:360px;overflow-y:auto}
.mth-item{display:flex;align-items:center;justify-content:space-between;flex-direction:row-reverse;padding:7px 14px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .12s}
.mth-item:hover{background:var(--surface2);color:var(--text)}
.mth-item.active{color:var(--cyan);font-weight:600}
.mdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.mdot.has{background:var(--cyan)}.mdot.empty{background:var(--border2)}
/* MAIN */
.main{flex:1;overflow:auto;padding:20px 24px}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;flex-direction:row-reverse}
.page-hdr-left{display:flex;align-items:center;gap:10px;flex-direction:row-reverse}
.page-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.month-chip{background:var(--cdim);border:1px solid rgba(0,212,170,0.3);color:var(--cyan);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600}
.page-hdr-right{display:flex;gap:8px;flex-direction:row-reverse}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-direction:row-reverse}
.sec-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2)}
.sec-actions{display:flex;gap:6px;flex-direction:row-reverse}
/* PANEL CARDS */
.panels-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:20px}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.panel-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px)}
.panel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.c-cyan::before{background:var(--cyan)}.c-gold::before{background:var(--gold)}
.c-blue::before{background:var(--blue)}.c-purple::before{background:var(--purple)}.c-orange::before{background:var(--orange)}
/* GAUGES */
.gauges-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:20px}
.gauges-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:16px}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.gauge-val{font-size:21px;font-weight:700;line-height:1;margin-top:2px}
.gauge-lbl{font-size:11px;color:var(--text2);font-weight:500;text-align:center}
.gauge-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;display:flex;align-items:center;gap:4px}
.gs-on{background:rgba(74,222,128,0.15);color:#4ADE80}
.gs-monitor{background:rgba(240,165,0,0.15);color:#F0A500}
.gs-risk{background:rgba(255,107,107,0.15);color:#FF6B6B}
/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;position:relative;transition:all .15s}
.kpi-card:hover{border-color:var(--border2);background:var(--surface2)}
.kpi-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;flex-direction:row-reverse}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.kpi-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px}
.kb-up{background:rgba(74,222,128,0.15);color:#4ADE80}
.kb-down{background:rgba(255,107,107,0.15);color:#FF6B6B}
.kb-flat{background:var(--surface3);color:var(--text3)}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;text-align:right}
.kpi-value{font-size:22px;font-weight:700;line-height:1.1;letter-spacing:-.5px;text-align:right}
.kpi-vs{font-size:10px;color:var(--text3);margin-top:3px;text-align:right}
.kpi-prog{height:3px;background:var(--surface3);border-radius:2px;margin-top:10px;overflow:hidden}
.kpi-prog-bar{height:100%;border-radius:2px;transition:width .5s}
.kpi-actions{position:absolute;top:8px;left:8px;display:none;gap:4px;z-index:2}
.kpi-card:hover .kpi-actions{display:flex}
.kpi-card.dragging{opacity:.4;border:1px dashed var(--cyan)}
/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.chart-card.full{grid-column:1/-1}
.chart-wrap{position:relative;width:100%}
.chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;justify-content:flex-end}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
/* TABLE */
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.data-tbl{width:100%;border-collapse:collapse;font-size:12px}
.data-tbl th{background:var(--surface2);padding:8px 12px;text-align:right;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase}
.data-tbl td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text2);text-align:right}
.data-tbl tr:last-child td{border-bottom:none}
.data-tbl tr:hover td{background:rgba(255,255,255,0.02);color:var(--text)}
/* FORECAST */
.forecast-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:0}
.forecast-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:8px}
.fb-up{background:rgba(74,222,128,0.15);color:#4ADE80}
.fb-down{background:rgba(255,107,107,0.15);color:#FF6B6B}
.fb-stable{background:rgba(79,142,247,0.15);color:#4F8EF7}
/* REPORT */
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:16px}
/* ADMIN */
.admin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.admin-card.highlighted{border-color:rgba(168,85,247,0.35)}
.admin-section-title{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-direction:row-reverse}
/* UPLOAD LOG */
.upload-log-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;flex-direction:row-reverse}
.upload-log-item:last-child{border-bottom:none}
.date-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:var(--surface3);color:var(--text2)}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.trend-arrow{font-size:11px;font-weight:600;margin-top:4px}
.ta-up{color:#4ADE80}.ta-down{color:#FF6B6B}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600}
.tag-purple{background:var(--pdim);color:var(--purple)}
/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:24px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);direction:rtl;text-align:right}
body.ltr .modal{direction:ltr;text-align:left}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:var(--text2)}
input,select,textarea{padding:8px 11px;border:1px solid var(--border2);border-radius:7px;font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);outline:none;transition:border .15s;width:100%;text-align:right}
input:focus,select:focus,textarea:focus{border-color:var(--cyan)}
body.ltr input,body.ltr select,body.ltr textarea{text-align:left}
select option{background:var(--surface2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-direction:row-reverse}
/* IMPORT */
.import-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px}
.import-zone:hover,.import-zone.drag-over{border-color:var(--cyan);background:var(--cdim)}
/* TOAST */
.toast{position:fixed;bottom:20px;left:20px;background:var(--cyan);color:#0D1117;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;box-shadow:0 4px 20px rgba(0,212,170,0.3)}
.toast.show{transform:translateY(0);opacity:1}
body.ltr .toast{right:20px;left:auto}
@media print{.topbar,.sidebar,.btn,.kpi-actions,.no-print{display:none!important}.main{padding:8px}}
</style>
</head>
<body>
<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-wrap"><img id="logoImg" alt="Miran Logo"></div>
    <div style="text-align:right">
      <div class="brand-name">Miran OPS Performance</div>
      <div class="brand-sub" id="brandSub">لوحة متابعة الأداء التشغيلي</div>
    </div>
    <div class="live-pill"><div class="live-dot"></div><span id="liveLbl">مباشر</span>&nbsp;—&nbsp;<span id="liveDate"></span></div>
  </div>
  <div class="topbar-right">
    <span style="font-size:11px;color:var(--text3)" id="lastUpdTxt"></span>
    <div class="lang-toggle">
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
      <div class="lang-sep"></div>
      <button class="lang-btn active" id="btnAr" onclick="setLang('ar')">عربي</button>
    </div>
    <button class="btn btn-ghost" onclick="downloadTemplate()">⬇ <span id="tTpl">قالب</span></button>
    <button class="btn btn-ghost" onclick="openImportModal()">⬆ <span id="tImp">استيراد</span></button>
    <button class="btn btn-cyan" onclick="exportCurrentMonth()">⬇ <span id="tExp">تصدير</span></button>
  </div>
</div>

<div class="shell">
<div class="sidebar" id="sidebarEl"></div>
<div class="main" id="mainArea"></div>
</div>

<!-- KPI MODAL -->
<div class="modal-overlay" id="kpiModal">
  <div class="modal">
    <div class="modal-title" id="kpiModalTitle">إضافة مؤشر</div>
    <div class="form-grid">
      <div class="fg full"><label id="lKpiName">اسم المؤشر</label><input type="text" id="kpiName" placeholder="مثال: إجمالي الإيرادات"></div>
      <div class="fg"><label id="lKpiTeam">الفريق</label>
        <select id="kpiTeam">
          <option value="sales" id="oSales">المبيعات</option>
          <option value="cs" id="oCS">خدمة العملاء</option>
          <option value="coord" id="oCoord">المنسقون</option>
          <option value="training" id="oTraining">التدريب</option>
        </select>
      </div>
      <div class="fg"><label id="lKpiUnit">الوحدة</label>
        <select id="kpiUnit">
          <option value="number" id="oNumber">رقم</option>
          <option value="currency" id="oCurrency">ريال سعودي</option>
          <option value="percent" id="oPercent">نسبة مئوية %</option>
          <option value="days" id="oDays">أيام</option>
          <option value="hours" id="oHours">ساعات</option>
          <option value="text" id="oText">نص / تقييم</option>
        </select>
      </div>
      <div class="fg"><label id="lKpiTarget">القيمة المستهدفة</label><input type="number" id="kpiTarget" placeholder="100"></div>
      <div class="fg"><label id="lKpiHB">الأعلى أفضل؟</label>
        <select id="kpiHigherBetter">
          <option value="yes" id="oYes">نعم</option>
          <option value="no" id="oNo">لا</option>
        </select>
      </div>
      <div class="fg"><label id="lKpiIcon">الأيقونة (إيموجي)</label><input type="text" id="kpiIcon" placeholder="💰" maxlength="2"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cyan" id="btnSaveKpi" onclick="saveKpi()">حفظ</button>
      <button class="btn btn-ghost" id="btnCancelKpi" onclick="closeKpiModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title" id="importModalTitle">استيراد بيانات الشهر</div>
    <div class="fg" style="margin-bottom:14px"><label id="lSelMonth">اختر الشهر</label><select id="importMonth" style="width:100%"></select></div>
    <div class="import-zone" id="importZone" onclick="document.getElementById('fileInput').click()" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <div style="font-size:28px;margin-bottom:8px">📊</div>
      <p><strong id="iClick" style="color:var(--text)">انقر للاختيار</strong> <span id="iDrag">أو اسحب وأفلت</span></p>
      <p style="margin-top:4px;font-size:11px;color:var(--text3)" id="iFormat">يدعم ملفات .xlsx و .xls</p>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(event)">
    <div id="importPreview" style="display:none;max-height:180px;overflow-y:auto">
      <div class="tbl-wrap"><table class="data-tbl" id="previewTable"></table></div>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:10px" id="iTip">💡 قم بتنزيل القالب أولاً للحصول على هيكل مؤشرات الأداء.</p>
    <div class="modal-actions">
      <button class="btn btn-cyan" id="confirmImportBtn" onclick="confirmImport()" style="display:none">استيراد البيانات</button>
      <button class="btn btn-ghost" id="btnCancelImport" onclick="closeImportModal()">إلغاء</button>
    </div>
  </div>
</div>

function fmt(v,u){
  if(v===null||v===undefined||v==='')return'—';
  var n=parseFloat(v);if(isNaN(n))return v;
  var sym=state.adminSettings.currencySymbol||'ر.س';
  if(u==='currency')return n.toLocaleString('en-US',{maximumFractionDigits:0})+' '+sym;
  if(u==='percent')return n.toFixed(1)+'%';
  if(u==='days')return n.toFixed(1)+(lang==='ar'?' يوم':' d');
  if(u==='hours')return n.toFixed(1)+(lang==='ar'?' ساعة':' h');
  return n.toLocaleString('en-US',{maximumFractionDigits:2});
}
function fmtS(v,u){
  if(v===null||v===undefined||v==='')return'—';
  var n=parseFloat(v);if(isNaN(n))return v;
  var sym=state.adminSettings.currencySymbol||'ر.س';
  if(u==='currency'){if(n>=1000000)return(n/1000000).toFixed(1)+'M '+sym;if(n>=1000)return(n/1000).toFixed(0)+'K '+sym;return n+' '+sym;}
  if(u==='percent')return n.toFixed(1)+'%';
  if(n>=1000)return(n/1000).toFixed(1)+'K';
  return n.toLocaleString('en-US',{maximumFractionDigits:1});
}

  var idx=ML.findIndex(function(m){return m.key===state.activeMonth;});if(idx<=0)return null;

// ═══════════════════ FORECASTING ═══════════════════
function getHistVals(kpiId,n){
  var idx=ML.findIndex(function(m){return m.key===state.activeMonth;});
  var vals=[];
  for(var i=Math.max(0,idx-n);i<=idx;i++){var v=(state.data[ML[i].key]||{})[kpiId];if(v!==undefined&&v!=='')vals.push({month:ML[i],val:parseFloat(v)});}
  return vals;
}
function linForecast(vals,steps){
  if(vals.length<2)return null;
  var n=vals.length,xs=[],ys=[];
  vals.forEach(function(v,i){xs.push(i);ys.push(v.val);});
  var xm=xs.reduce(function(a,b){return a+b;},0)/n,ym=ys.reduce(function(a,b){return a+b;},0)/n;
  var num=0,den=0;
  xs.forEach(function(x,i){num+=(x-xm)*(ys[i]-ym);den+=(x-xm)*(x-xm);});
  if(!den)return ym;
  var slope=num/den,intc=ym-slope*xm;
  return intc+slope*(n-1+steps);
}
function maForecast(vals,w){
  if(!vals.length)return null;
  if(w>vals.length)w=vals.length;
  return vals.slice(-w).reduce(function(a,b){return a+b.val;},0)/w;
}
function growthRate(vals){
  if(vals.length<2)return 0;
  var f=vals[0].val,l=vals[vals.length-1].val;
  if(!f)return 0;
  return((l-f)/Math.abs(f))*100;
}
function forecastKpi(kpiId,steps){
  var vals=getHistVals(kpiId,12);
  if(!vals.length)return{linear:null,ma:null,growth:0,confidence:T('fcLow'),trend:T('fcStable'),histVals:vals};
  var lin=linForecast(vals,steps),ma=maForecast(vals,3),gr=growthRate(vals);
  var conf=vals.length>=6?T('fcHigh'):vals.length>=3?T('fcMed'):T('fcLow');
  var trend=gr>5?T('fcUp'):gr<-5?T('fcDown'):T('fcStable');
  return{linear:lin,ma:ma,growth:gr,confidence:conf,trend:trend,histVals:vals};
}

function renderGauges(md){
  var gKpis=[{id:'c1',k:'gCsat'},{id:'c6',k:'gRetention'},{id:'t4',k:'gTrainingComp'},{id:'o2',k:'gOnTime'},{id:'s6',k:'gConversion'},{id:'c4',k:'gFCR'}];
  var grid=el('gaugesGrid');grid.innerHTML='';
  gKpis.forEach(function(gk){
    var kpi=state.kpis.find(function(k){return k.id===gk.id;});if(!kpi)return;
    var val=md[kpi.id];
    var pct=val!==undefined&&val!==''?Math.min(parseFloat(val)/parseFloat(kpi.target)*100,100):0;
    var st=val!==undefined?kpiSt(kpi,val):{cls:'gs-monitor',lbl:T('gsNoData')};
    var color=st.cls==='gs-on'?'#4ADE80':st.cls==='gs-monitor'?'#F0A500':'#FF6B6B';
    var cid='gv-'+gk.id;
    var div=document.createElement('div');div.className='gauge-wrap';
    div.innerHTML='<div style="position:relative;width:140px;height:84px;overflow:hidden"><canvas id="'+cid+'" width="140" height="84" role="img" aria-label="'+T(gk.k)+'"></canvas></div>'
      +'<div class="gauge-val" style="color:'+color+'">'+(val!==undefined&&val!==''?fmt(val,kpi.unit):'—')+'</div>'
      +'<div class="gauge-lbl">'+T(gk.k)+'</div>'
      +'<div class="gauge-status '+st.cls+'">'+(st.cls==='gs-on'?'●':'▲')+' '+st.lbl+'</div>';
    grid.appendChild(div);
    (function(cid,pct,color){setTimeout(function(){drawGauge(cid,pct,color);},50);})(cid,pct,color);
  });
}
function drawGauge(id,pct,color){
  var canvas=el(id);if(!canvas)return;
  var ctx=canvas.getContext('2d');var cx=70,cy=76,r=54;
  ctx.clearRect(0,0,140,84);
  ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,2*Math.PI);ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=11;ctx.lineCap='round';ctx.stroke();
  var fill=Math.PI+(pct/100)*Math.PI;
  ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,fill);ctx.strokeStyle=color;ctx.lineWidth=11;ctx.lineCap='round';ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='9px Inter';
  ctx.textAlign='left';ctx.fillText('0',cx-r-8,cy+5);ctx.textAlign='right';ctx.fillText('100',cx+r+8,cy+5);
}

        +'<div style="background:var(--surface2);border-radius:8px;padding:8px;text-align:'+align+'">'

        +'<div style="font-size:10px;color:var(--text3);text-align:'+align+';margin-top:4px">'+T('fcBasedOn')+' <strong>'+vals.length+'</strong> '+T('fcMonths')+'</div></div>';

        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8B9BB4',font:{size:10},boxWidth:10}}},scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#4A5A75',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#4A5A75',font:{size:10}}}}}});
      },80);
    })(team,kpis);

function buildRecs(md,isAr,dir,align){
  var recs=[];
  var csat=parseFloat(md.c1||0),conv=parseFloat(md.s6||0),onTime=parseFloat(md.o2||0),comp=parseFloat(md.t4||0);
  if(csat>0&&csat<85)recs.push({icon:'🎧',team:T('oCS'),text:T('recCsat'),prio:T('prioHigh'),color:'#FF6B6B'});
  if(conv>0&&conv<25)recs.push({icon:'💰',team:T('oSales'),text:T('recConv'),prio:T('prioMed'),color:'#F0A500'});
  if(onTime>0&&onTime<90)recs.push({icon:'📦',team:T('oCoord'),text:T('recOnTime'),prio:T('prioHigh'),color:'#FF6B6B'});
  if(comp>0&&comp<80)recs.push({icon:'🎓',team:T('oTraining'),text:T('recTraining'),prio:T('prioLow'),color:'#4ADE80'});
  if(!recs.length)recs.push({icon:'✅',team:T('recAll'),text:T('recAllGood'),prio:T('prioExc'),color:'#4ADE80'});
  return recs.map(function(r){return '<div style="background:var(--surface2);border-radius:9px;padding:12px 14px;margin-bottom:8px;border-'+(isAr?'right':'left')+':3px solid '+r.color+';display:flex;align-items:flex-start;justify-content:space-between;flex-direction:'+dir+';gap:12px">'
    +'<div style="flex:1;text-align:'+align+'"><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px">'+r.icon+' '+r.team+'</div><div style="font-size:12px;color:var(--text2);line-height:1.6">'+r.text+'</div></div>'
    +'<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:'+r.color+'22;color:'+r.color+';flex-shrink:0">'+r.prio+'</span></div>';}).join('');
}
function generateAutoAnalysis(md,meta){
  var isAr=lang==='ar';
  var rev=parseFloat(md.s1||0),csat=parseFloat(md.c1||0),onTime=parseFloat(md.o2||0),comp=parseFloat(md.t4||0),clients=parseFloat(md.s2||0);
  if(isAr){
    return 'تقرير الأداء التشغيلي — '+ml(meta)+'\n\n'
      +'على صعيد المبيعات، '+(rev>0?'بلغت إجمالي الإيرادات '+fmt(rev,'currency')+' خلال هذا الشهر، مع استقطاب '+(clients||'عدد من')+' العملاء الجدد.':'لم يتم إدخال بيانات المبيعات بعد.')+'\n\n'
      +'أما خدمة العملاء، '+(csat>0?'فقد سجّل مؤشر رضا العملاء '+fmt(csat,'percent')+', '+(csat>=90?'وهو مستوى ممتاز.':csat>=75?'وهو مستوى جيد مع وجود فرص للتحسين.':'مما يستدعي مراجعة أسباب تراجع الرضا.'):'لم يتم إدخال بيانات خدمة العملاء.')+'\n\n'
      +'فيما يخص قسم التنسيق، '+(onTime>0?'بلغ معدل التسليم في الوقت '+fmt(onTime,'percent')+', '+(onTime>=95?'وهو أداء متميز.':'وهو دون المستهدف.'):'لم يتم إدخال بيانات التنسيق.')+'\n\n'
      +'وعلى صعيد التدريب، '+(comp>0?'بلغت نسبة إكمال التدريب '+fmt(comp,'percent')+', '+(comp>=90?'وهو مستوى احترافي.':'ويمكن تعزيزها.'):'لم يتم إدخال بيانات التدريب.');
  }
  return 'Operations Performance Report — '+ml(meta)+'\n\n'
    +'Sales: '+(rev>0?'Total revenue reached '+fmt(rev,'currency')+' this month, with '+(clients||'a number of')+' new clients.':'Sales data not entered yet.')+'\n\n'
    +'Customer Service: '+(csat>0?'CSAT score recorded '+fmt(csat,'percent')+', '+(csat>=90?'an excellent level.':csat>=75?'a good level with room for improvement.':'which requires attention.'):'CS data not entered.')+'\n\n'
    +'Coordination: '+(onTime>0?'On-time delivery reached '+fmt(onTime,'percent')+', '+(onTime>=95?'outstanding performance.':'below target.'):'Coordination data not entered.')+'\n\n'
    +'Training: '+(comp>0?'Training completion reached '+fmt(comp,'percent')+', '+(comp>=90?'a professional level.':'can be improved.'):'Training data not entered.');
}

function saveAdminSettings(){

// ═══════════════════ KPI CARD ═══════════════════
function buildKpiCard(kpi,value){
  var has=value!==undefined&&value!==null&&value!=='';
  var color=tc(kpi.team);var delta=has?getDelta(kpi,value):null;
  var isAr=lang==='ar';var dir=isAr?'row-reverse':'row';var align=isAr?'right':'left';
  var badge='';
  if(delta){var good=kpi.higherBetter?delta.up:!delta.up;badge='<div class="kpi-badge '+(good?'kb-up':'kb-down')+'">'+(delta.up?'↑':'↓')+Math.abs(delta.pct)+'%</div>';}
  else if(has)badge='<div class="kpi-badge kb-flat">—</div>';
  var pct=has?pctTgt(kpi,value):0;
  return '<div class="kpi-card" draggable="true" data-id="'+kpi.id+'" ondragstart="dStart(event,\''+kpi.id+'\')" ondragover="dOver(event)" ondrop="dDrop(event,\''+kpi.id+'\')" ondragend="dEnd(event)">'
    +'<div class="kpi-actions"><button class="btn btn-ghost btn-xs" onclick="editKpiModal(\''+kpi.id+'\')">✏</button><button class="btn btn-ghost btn-xs" onclick="editValueModal(\''+kpi.id+'\')">⌨</button><button class="btn btn-danger btn-xs" onclick="deleteKpi(\''+kpi.id+'\')">✕</button></div>'
    +'<div class="kpi-card-top"><div class="kpi-icon" style="background:'+tcd(kpi.team)+'">'+(kpi.icon||'📊')+'</div>'+badge+'</div>'
    +'<div class="kpi-label">'+kpi.name+'</div>'
    +'<div class="kpi-value" style="color:'+color+'">'+(has?fmtS(value,kpi.unit):'—')+'</div>'
    +(kpi.target&&has?'<div class="kpi-vs">↑ '+Math.round(pct)+'% '+T('pctOf')+'</div>':'')
    +'<div class="kpi-prog"><div class="kpi-prog-bar" style="width:'+pct+'%;background:'+color+'"></div></div>'
    +'</div>';
}

function dStart(e,id){dragSrcId=id;e.target.classList.add('dragging');}
function dOver(e){e.preventDefault();}
function dEnd(e){e.target.classList.remove('dragging');}
function dDrop(e,tid){
  e.preventDefault();if(dragSrcId===tid)return;
  var src=state.kpis.find(function(k){return k.id===dragSrcId;}),tgt=state.kpis.find(function(k){return k.id===tid;});
  if(!src||!tgt||src.team!==tgt.team)return;
  var tmp=src.order;src.order=tgt.order;tgt.order=tmp;
  saveState();renderMain();
}

// ═══════════════════ KPI MODAL ═══════════════════
function addKpiModal(team){
  editingKpiId=null;
  setTxt('kpiModalTitle',T('addKpiTitle'));
  ['kpiName','kpiTarget','kpiIcon'].forEach(function(id){el(id).value='';});
  el('kpiTeam').value=team||'sales';el('kpiUnit').value='number';el('kpiHigherBetter').value='yes';
  el('kpiModal').classList.add('open');
}
function editKpiModal(id){
  var k=state.kpis.find(function(x){return x.id===id;});if(!k)return;
  editingKpiId=id;setTxt('kpiModalTitle',T('editKpiTitle'));
  el('kpiName').value=k.name;el('kpiTeam').value=k.team;el('kpiUnit').value=k.unit;
  el('kpiTarget').value=k.target||'';el('kpiHigherBetter').value=k.higherBetter?'yes':'no';
  el('kpiIcon').value=k.icon||'';
  el('kpiModal').classList.add('open');
}
function closeKpiModal(){el('kpiModal').classList.remove('open');}
function saveKpi(){
  var name=el('kpiName').value.trim();if(!name)return toast(T('enterName'));
  if(editingKpiId){
    var k=state.kpis.find(function(x){return x.id===editingKpiId;});
    k.name=name;k.team=el('kpiTeam').value;k.unit=el('kpiUnit').value;
    k.target=parseFloat(el('kpiTarget').value)||0;k.higherBetter=el('kpiHigherBetter').value==='yes';k.icon=el('kpiIcon').value||'📊';
  } else {
    var team=el('kpiTeam').value;
    var maxO=Math.max.apply(null,[0].concat(state.kpis.filter(function(k){return k.team===team;}).map(function(k){return k.order;})))+1;
    state.kpis.push({id:'k'+Date.now(),name:name,team:team,unit:el('kpiUnit').value,target:parseFloat(el('kpiTarget').value)||0,higherBetter:el('kpiHigherBetter').value==='yes',icon:el('kpiIcon').value||'📊',order:maxO});
  }
  saveState();closeKpiModal();renderSidebar();renderMain();toast(editingKpiId?T('kpiUpdated'):T('kpiAdded'));
}
function deleteKpi(id){
  if(!confirm(T('kpiDeleted')+'?'))return;
  state.kpis=state.kpis.filter(function(k){return k.id!==id;});
  Object.keys(state.data).forEach(function(m){if(state.data[m])delete state.data[m][id];});
  saveState();renderSidebar();renderMain();toast(T('kpiDeleted'));
}
function editValueModal(kpiId){
  var kpi=state.kpis.find(function(k){return k.id===kpiId;});if(!kpi)return;
  var meta=getMeta();var cur=(state.data[meta.key]||{})[kpiId]||'';
  var val=prompt('['+tl(kpi.team)+'] '+kpi.name+'\n'+T('promptTarget')+' '+fmt(kpi.target,kpi.unit)+'\n'+T('promptMonth')+' '+ml(meta)+'\n'+T('promptCurrent')+' '+(cur!==''?fmt(cur,kpi.unit):T('promptEmpty')),cur);
  if(val===null)return;
  if(!state.data[meta.key])state.data[meta.key]={};
  state.data[meta.key][kpiId]=val===''?undefined:val;
  saveState();renderSidebar();renderMain();toast(T('kpiSaved'));
}
function enterDataPrompt(team){
  var meta=getMeta();
  var kpis=state.kpis.filter(function(k){return k.team===team;}).sort(function(a,b){return a.order-b.order;});
  if(!kpis.length)return toast(T('noKpisDef'));
  var changed=false;
  for(var i=0;i<kpis.length;i++){
    var k=kpis[i];var cur=(state.data[meta.key]||{})[k.id]||'';
    var val=prompt('['+tl(team)+'] '+k.name+'\n'+T('promptTarget')+' '+fmt(k.target,k.unit)+'\n'+T('promptCurrent')+' '+(cur!==''?fmt(cur,k.unit):T('promptEmpty')),cur);
    if(val===null)break;
    if(!state.data[meta.key])state.data[meta.key]={};
    state.data[meta.key][k.id]=val===''?undefined:val;changed=true;
  }
  if(changed){saveState();renderSidebar();renderMain();toast(T('dataSaved'));}
}

// ═══════════════════ IMPORT ═══════════════════
function populateImportSelect(){
  var sel=el('importMonth');if(!sel)return;sel.innerHTML='';
  ML.forEach(function(m){var opt=document.createElement('option');opt.value=m.key;opt.textContent=ml(m);if(m.key===state.activeMonth)opt.selected=true;sel.appendChild(opt);});
}
function openImportModal(){
  populateImportSelect();pendingImportData=null;
  el('importPreview').style.display='none';
  el('confirmImportBtn').style.display='none';
  el('fileInput').value='';
  el('importModal').classList.add('open');
}
function closeImportModal(){el('importModal').classList.remove('open');}
function handleDragOver(e){e.preventDefault();el('importZone').classList.add('drag-over');}
function handleDragLeave(){el('importZone').classList.remove('drag-over');}
function handleDrop(e){e.preventDefault();el('importZone').classList.remove('drag-over');var f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFileSelect(e){var f=e.target.files[0];if(f)processFile(f);}
function processFile(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2)return toast(lang==='ar'?'الملف يبدو فارغاً':'File appears empty');
      renderPreview(rows);pendingImportData=rows;
      el('confirmImportBtn').style.display='block';setTxt('confirmImportBtn',T('btnImport'));
    }catch(err){toast('Error: '+err.message);}
  };
  r.readAsArrayBuffer(file);
}
function renderPreview(rows){
  var p=el('importPreview');var t=el('previewTable');
  var h=rows[0];var html='<thead><tr>'+h.map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>';
  rows.slice(1,7).forEach(function(row){html+='<tr>'+row.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';});
  if(rows.length>7)html+='<tr><td colspan="'+h.length+'" style="color:var(--text3)">... '+(rows.length-7)+(lang==='ar'?' صف إضافي':' more rows')+'</td></tr>';
  t.innerHTML=html+'</tbody>';p.style.display='block';
}
function confirmImport(){
  if(!pendingImportData)return;
  var mk=el('importMonth').value;var rows=pendingImportData;
  var headers=rows[0].map(function(h){return String(h).trim().toLowerCase();});
  var kc=headers.findIndex(function(h){return h.includes('kpi')||h.includes('name')||h.includes('اسم')||h.includes('مؤشر');});
  var vc=headers.findIndex(function(h){return h.includes('value')||h.includes('actual')||h.includes('قيمة')||h.includes('فعلي');});
  var md=state.data[mk]||{};var matched=0;
  if(kc!==-1&&vc!==-1){
    rows.slice(1).forEach(function(row){
      var name=String(row[kc]||'').trim().toLowerCase();var val=row[vc];
      if(!name||val==='')return;
      var k=state.kpis.find(function(x){return x.name.toLowerCase()===name||x.nameEn&&x.nameEn.toLowerCase()===name||x.name.toLowerCase().includes(name);});
      if(k){md[k.id]=val;matched++;}
    });
  } else {
    var kpis=[].concat(state.kpis).sort(function(a,b){return a.team.localeCompare(b.team)||a.order-b.order;});
    rows.slice(1).forEach(function(row,i){if(i>=kpis.length)return;var val=row[1]!==undefined?row[1]:row[0];if(val!==''&&val!==null){md[kpis[i].id]=val;matched++;}});
  }
  state.data[mk]=md;
  var existing=state.uploadLog.findIndex(function(u){return u.monthKey===mk;});
  var logEntry={monthKey:mk,date:new Date().toLocaleDateString(lang==='ar'?'ar-SA':'en-US',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'}),count:matched};
  if(existing>=0)state.uploadLog[existing]=logEntry;else state.uploadLog.unshift(logEntry);
  saveState();closeImportModal();renderSidebar();renderMain();
  var m=ML.find(function(x){return x.key===mk;});
  toast(T('importedMsg')+' '+matched+' '+T('kpisWord')+' — '+(m?ml(m):''));
}

// ═══════════════════ EXPORT / TEMPLATE ═══════════════════
function downloadTemplate(){
  var wb=XLSX.utils.book_new();
  var inst=[['Miran OPS Performance — '+T('importTitle')],[''],['1. '+T('lSelMonth')],['2. '+(lang==='ar'?'أدخل القيم في العمود B':'Fill Column B with actual values')],['3. '+(lang==='ar'?'لا تغير العمود A':'Do not edit Column A (KPI names)')],['4. '+(lang==='ar'?'ارفع الملف عبر زر الاستيراد':'Upload via Import button')]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(inst),lang==='ar'?'التعليمات':'Instructions');
  var teams=['sales','cs','coord','training'];
  ML.forEach(function(m){
    var allK=teams.reduce(function(acc,t){return acc.concat(state.kpis.filter(function(k){return k.team===t;}).sort(function(a,b){return a.order-b.order;}));});
    var ws=XLSX.utils.aoa_to_sheet([[T('colKpi'),'Actual Value / القيمة الفعلية',T('colTarget'),(lang==='ar'?'القسم':'Team'),T('colUnit')]].concat(allK.map(function(k){return[k.name,(state.data[m.key]||{})[k.id]||'',k.target,tl(k.team),k.unit];})));
    ws['!cols']=[{wch:30},{wch:18},{wch:14},{wch:22},{wch:12}];
    var sn=ml(m).slice(0,28);
    try{XLSX.utils.book_append_sheet(wb,ws,sn);}catch(e){XLSX.utils.book_append_sheet(wb,ws,m.key);}
  });
  XLSX.writeFile(wb,'Miran_OPS_Template_2025_2030.xlsx');toast(T('tplDl'));
}
function exportCurrentMonth(){
  var meta=getMeta();var md=state.data[meta.key]||{};
  var wb=XLSX.utils.book_new();var rows=[];
  ['sales','cs','coord','training'].forEach(function(t){
    state.kpis.filter(function(k){return k.team===t;}).sort(function(a,b){return a.order-b.order;}).forEach(function(k){
      var val=md[k.id]||'';var pct=val!==''&&k.target?((parseFloat(val)/k.target)*100).toFixed(1)+'%':'';
      rows.push([tl(t),k.name,val,k.target,k.unit,pct]);
    });
  });
  var ws=XLSX.utils.aoa_to_sheet([[T('oSales').includes('ال')?'القسم':'Team',T('colKpi'),T('colActual'),T('colTarget'),T('colUnit'),T('colPct')]].concat(rows));
  ws['!cols']=[{wch:20},{wch:30},{wch:16},{wch:14},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,ml(meta).slice(0,28));
  XLSX.writeFile(wb,'Miran_OPS_'+meta.key+'.xlsx');toast(T('monthExp'));
}

// ═══════════════════ INIT ═══════════════════
function init(){
  var l=lang;
  document.body.classList.toggle('ltr',l==='en');
  document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';
  el('btnEn').classList.toggle('active',l==='en');
  el('btnAr').classList.toggle('active',l==='ar');
  applyStaticTrans();
  renderSidebar();
  renderMain();
}
init();
</script>
